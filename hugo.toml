baseURL = 'https://piljoong.dev/'
defaultContentLanguage = 'en'
languageCode = 'en-us'
title = 'piljoong.dev'
theme = "DoIt"

pagerSize = 12
copyright = "kpiljoong@gmail.com"

enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true

[params]
    title = "piljoong.dev"
    description = "piljoong's tech blog"
    defaultTheme = "auto"
    ShowReadingTime = true

[params.header]
    desktopMode = "fixed"
    mobileMode = "auto"
[params.header.title]
    logo = ""
    name = "piljoong.dev"
    pre = ""
    post = ""
    typeit = false

[params.home.profile]
    enable = true
    subtitle = ""
    avatarURL = "/avatar.png"
    avatarLinkURL = ""
    title = "piljoong.dev"
    typeit = true
    social = true
    disclaimer = ""
[params.home.posts]
    enable = true
    pagerSize = 10

[params.social]
    GitHub = "kpiljoong"
    Linkedin = "piljoong-kim"

[params.author]
    name = "piljoong"
    email = "kpiljoong@gmail.com"
    link = "https://piljoong.dev"
    avatar = "/avatar.png"

[params.list]
    pagerSize = 20
    dateFormat = "01-02"
    rss = 10

[params.page]
    hiddenFromHomePage = false
    hiddenFromSearch = false
    twemoji = false
    lightgallery = false
    ruby= true
    fraction = true
    linkToMarkdown = true

[params.page.table]
    sort = true
[params.page.math]
    enable = true

[params.page.toc]
    enable = true
    keepStatic = false
    auto = true

[params.page.share]
    enable = true
    Linkiedin = true
    Reddit = true
    Weibo = false

[params.footer]
    enable = true
    custom = ''
    hugo = false
    copyright = true
